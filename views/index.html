<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" type="text/css" />
    <title>Exercise Tracker</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>

  <body>
    <div class="container">
      <h1>Exercise Tracker</h1>
      <form id="create-user-form" action="/api/users" method="post">
        <h2>Create a New User</h2>
        <p class="code"><code>POST /api/users</code></p>
        <input id="uname" type="text" name="username" placeholder="username" />
        <input type="submit" value="Submit" />
      </form>
      <form action="/api/users/:_id/exercises" id="exercise-form" method="post">
        <h2>Add exercises</h2>
        <p class="code"><code>POST /api/users/:_id/exercises</code></p>
        <!-- <input id="uid" type="text" name=":_id" placeholder=":_id" /> -->
        <select id="exercise-user-select" class="user-dropdown">
          <option value="">Select a user...</option>
        </select>
        <input id="desc" type="text" name="description" placeholder="description*" />
        <input id="dur" type="text" name="duration" placeholder="duration* (mins.)" />
        <input id="date" type="date" name="date" placeholder="date (yyyy-mm-dd)" />
        <input type="submit" value="Submit" />
      </form>
      <form id="log-form">
        <h2>View Exercise Log</h2>
        <p class="code"><code>GET /api/users/:_id/logs?[from][&amp;to][&amp;limit]</code></p>
        <p class="optional-get-queries code"><strong>[ ]</strong> = optional</p>
        <p class="optional-get-queries code"><strong>from, to</strong> = dates (yyyy-mm-dd); <strong>limit</strong> = number</p>
        <!-- <input id="log-user-id" type="text" placeholder="User ID" required/> -->
        <select id="log-user-select" class="user-dropdown">
          <option value="">Select a user...</option>
        </select>
        <input id="log-from" type="date"/>
        <input id="log-to" type="date"/>
        <input id="log-limit" type="number" min="1" placeholder="Limit"/>
        <input type="submit" value="View Log" />
      </form>
    </div>
    <dialog id="response-modal">
      <h2 id="modal-title"></h2>
      <div id="modal-content"></div>
      <details>
        <summary>JSON Response</summary>
        <pre id="modal-json"></pre>
      </details>
      <div class="modal-buttons">
        <button id="close-btn">Close</button>
      </div>
    </dialog>
    <!-- <div>
      <h2>Response (JSON):</h2>
      <pre id="response-output-json"></pre>
      <h2>Response (UX):</h2>
      <div id="response-output-ux"></div>
    </div> -->
    <script src="/app.js"></script>
  </body>
</html>
